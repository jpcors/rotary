[rotary-phone]
; Off-hook (no digits dialed)
exten => s,1,Answer()
 same => n,EAGI(rotary/run-eagi.sh)
 same => n,Hangup()

; Any dialed number → same EAGI
exten => _X.,1,Answer()
 same => n,EAGI(rotary/run-eagi.sh)
 same => n,Hangup()

; Dial 0 → AI assistant
exten => 0,1,Answer()
 same => n,EAGI(rotary/run-eagi.sh)
 same => n,Hangup()

; Echo test — proves bidirectional audio
exten => 999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Record test — proves recording works
exten => 888,1,Answer()
 same => n,Playback(beep)
 same => n,Record(/tmp/test-recording.wav,3,5)
 same => n,Playback(/tmp/test-recording)
 same => n,Hangup()
