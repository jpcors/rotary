; PJSIP configuration for rotary phone endpoint
; Change the credentials below before deploying

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[rotary]
type=aor
max_contacts=1
remove_existing=yes

[rotary-auth]
type=auth
auth_type=userpass
username=rotary
password=CHANGEME

[rotary-endpoint]
type=endpoint
context=rotary-phone
disallow=all
allow=ulaw
allow=alaw
auth=rotary-auth
aors=rotary
direct_media=no
rtp_symmetric=yes

; Match your ATA's IP address
[rotary-identify]
type=identify
endpoint=rotary-endpoint
match=192.168.1.0/24
